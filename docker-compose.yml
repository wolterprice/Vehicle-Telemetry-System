version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/data
    environment:
      - DB_PATH=/data/telemetry.db
      - PORT=8080

  dashboard:
    build: ./dashboard
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  backend-data:

